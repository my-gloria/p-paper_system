<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Upload</title>
  <link rel="stylesheet" href="upload.css">
</head>
<body>
  <div class="upload-container">
    <div class="drag-text">Drag & Drop</div>
    
    <div class="upload-box">
      <h2>Add Documents</h2>
      
      <label for="title">Title</label>
      <input type="text" id="title" placeho`lder="PMS Scope">
      
      <label for="file">Attach Documents</label>
      <div class="drop-area">
        <p>Drop here</p>
        <input type="file" id="file" accept=".doc,.docx">
      </div>
      
      <p class="file-types">Accepted File Types: .doc and .docx only</p>
      <p class="secure">Secure</p>
      
      <button class="upload-btn">Upload</button>
    </div>
    
    <div class="credits">
    
    </div>
  </div>
</body>
</html>
